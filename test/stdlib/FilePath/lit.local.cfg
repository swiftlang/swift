# FilePath is built only for Darwin, Linux, and Windows. See
# stdlib/public/core/CMakeLists.txt, which drops the FilePath sources from the
# regular stdlib on every other SDK. Skip this whole directory anywhere FilePath
# isn't built, so its tests aren't compiled against a stdlib that lacks the type.
_triple = config.variant_triple or config.target_triple
_supported = (
    'apple' in _triple                                 # Darwin family (*-apple-*)
    or 'OS=linux-gnu' in config.available_features       # Linux (glibc; not Android)
    or 'OS=windows-msvc' in config.available_features    # Windows
)
if not _supported:
    config.unsupported = True
